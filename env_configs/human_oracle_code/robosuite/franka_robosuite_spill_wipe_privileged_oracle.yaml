# Usage: uv run hyrl/envs/launch.py --config-path env_configs/human_oracle_code/franka_robosuite_spill_wipe_privileged_oracle.yaml

env:
  _target_: capx.envs.tasks.franka.franka_spill_wipe.FrankaSpillWipeCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: franka_robosuite_spill_wipe_low_level
    privileged: true
    apis:
      - FrankaControlPrivilegedApiSpongeEndEffector
    # prompt is inherited from FrankaSpillWipeCodeEnv class default

record_video: true
output_dir: ./outputs/franka_robosuite_spill_wipe_privileged_oracle
use_oracle_code: true

trials: 100
num_workers: 10
